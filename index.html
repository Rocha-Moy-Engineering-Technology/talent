<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salary Progression Plan</title>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.7/babel.min.js"></script>
  <style>html, body { margin: 0; padding: 0; background: #0F172A; }</style>
</head>
<body>
  <div id="root"></div>
  <script>
    (async () => {
      const src = await (await fetch("./salary-progression-plan.jsx")).text();
      const prelude =
        "const { XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine, Area, ComposedChart } = Recharts;\n";
      const body = src
        .replace(/^\s*import[\s\S]+?from\s+["']recharts["'];?\s*$/m, "")
        .replace(/export\s+default\s+function/, "function");
      const coda =
        "\nReactDOM.createRoot(document.getElementById('root')).render(React.createElement(SalaryProgressionPlan));";
      const { code } = Babel.transform(prelude + body + coda, { presets: ["react"] });
      const s = document.createElement("script");
      s.textContent = code;
      document.body.appendChild(s);
    })().catch(err => {
      document.body.innerHTML = "<pre style='color:#FCA5A5;padding:24px;font-family:monospace'>" + err.stack + "</pre>";
    });
  </script>
</body>
</html>
